<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>MARBLE MAYHEM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050508;overflow:hidden;font-family:'Courier New',monospace;touch-action:none}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
/* The secret: render at low res, scale up with nearest-neighbor = pixel art look */
#c{
  display:block;
  width:100vw;height:100vh;
  touch-action:none;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
}
#hud{position:fixed;top:0;left:0;right:0;height:44px;display:flex;
  justify-content:space-between;align-items:center;padding:0 14px;
  background:rgba(0,0,0,0.92);border-bottom:2px solid #ff6600;z-index:100;color:#fff}
.hb{display:flex;flex-direction:column;align-items:center}
.hl{color:#ff6600;font-size:9px;letter-spacing:2px;text-transform:uppercase}
.hv{font-size:22px;font-weight:bold}
#lives-wrap{display:flex;gap:4px}
.ld{width:14px;height:14px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#88ddff,#1166cc);
  box-shadow:0 0 5px #4af}
.ld.dead{background:#222;box-shadow:none}
#tbar{position:fixed;top:44px;left:0;right:0;height:5px;background:#111;z-index:100}
#tb{height:100%;background:linear-gradient(90deg,#0f0,#ff0,#f30);transition:width .15s}
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.93);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:500;color:#fff}
.ov h1{font-size:clamp(28px,6vw,52px);color:#ff6600;letter-spacing:6px;
  text-shadow:0 0 30px #ff6600;margin-bottom:6px}
.sub{font-size:13px;color:#888;letter-spacing:3px;margin-bottom:22px}
.btn{padding:10px 32px;background:transparent;border:2px solid #ff6600;color:#ff6600;
  font-family:'Courier New',monospace;font-size:14px;letter-spacing:3px;cursor:pointer;
  text-transform:uppercase;transition:all .2s;margin:4px}
.btn:hover,.btn:active{background:#ff6600;color:#000}
.sbig{font-size:38px;color:#ffcc00;margin:8px 0}
.lbig{font-size:66px;color:#ff6600;line-height:1}
.lname{font-size:13px;color:#aaa;letter-spacing:4px;margin:4px 0 20px}

#rot-btn{
  position:fixed;bottom:20px;right:20px;z-index:200;
  width:52px;height:52px;border-radius:50%;
  background:rgba(0,0,0,0.75);border:2px solid #ff6600;
  color:#ff6600;font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  user-select:none;transition:background .15s;
}
#rot-btn:hover{background:rgba(255,102,0,0.25);}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<button id="rot-btn" title="Rotate view">↻</button>

<div id="hud">
  <div class="hb"><div class="hl">Score</div><div class="hv" id="sc">0</div></div>
  <div class="hb"><div class="hl">Level</div><div class="hv" id="lv">1</div></div>
  <div class="hb"><div class="hl">Time</div><div class="hv" id="tm">60</div></div>
  <div class="hb"><div class="hl">Lives</div>
    <div id="lives-wrap">
      <div class="ld" id="l0"></div><div class="ld" id="l1"></div><div class="ld" id="l2"></div>
    </div>
  </div>
</div>
<div id="tbar"><div id="tb" style="width:100%"></div></div>

<div class="ov" id="ov-start">
  <h1>MARBLE MAYHEM</h1><div class="sub">8-BIT ARCADE EDITION</div>
  <p style="color:#555;font-size:11px;max-width:280px;text-align:center;margin-bottom:20px">
    Reach the GOAL before time runs out.<br>Drag to roll. Don't fall off.
  </p>
  <button class="btn" id="btn-start">INSERT COIN</button>
</div>
<div class="ov" id="ov-level" style="display:none">
  <div class="sub">LEVEL</div><div class="lbig" id="lv-num">1</div>
  <div class="lname" id="lv-name">BEGINNER'S LUCK</div>
  <button class="btn" id="btn-go">GO!</button>
</div>
<div class="ov" id="ov-dead" style="display:none">
  <h1>FELL OFF!</h1><div class="sub" id="dead-sub">LIVES: 2</div>
  <button class="btn" id="btn-retry">TRY AGAIN</button>
</div>
<div class="ov" id="ov-time" style="display:none">
  <h1>TIME'S UP!</h1><div class="sub" id="time-sub">LIVES: 2</div>
  <button class="btn" id="btn-time">TRY AGAIN</button>
</div>
<div class="ov" id="ov-over" style="display:none">
  <h1>GAME OVER</h1><div class="sbig" id="final-sc">0</div>
  <button class="btn" id="btn-over">PLAY AGAIN</button>
</div>
<div class="ov" id="ov-win" style="display:none">
  <h1>YOU WIN!</h1><div class="sbig" id="win-sc">0</div>
  <button class="btn" id="btn-win">PLAY AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// =============================================================================
// MARBLE MAYHEM — True 3D Three.js with PIXELATED downsampling
// Render at ~320×200 equivalent, upscale with image-rendering:pixelated
// This gives authentic chunky pixel look while solving all occlusion issues
// =============================================================================

// ── RENDERER ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
// Render at half res, CSS scales up with nearest-neighbour = 8-bit look
const PIX = 2; // pixel scale factor
const renderer = new THREE.WebGLRenderer({canvas, antialias: false});
renderer.setPixelRatio(1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.BasicShadowMap;
renderer.setClearColor(0x050508);

let RW = Math.floor(window.innerWidth / PIX);
let RH = Math.floor(window.innerHeight / PIX);

function resizeRenderer() {
  RW = Math.floor(window.innerWidth / PIX);
  RH = Math.floor(window.innerHeight / PIX);
  renderer.setSize(RW, RH, false); // false = don't set canvas CSS size
  // CSS scales the small canvas up to fill screen with pixelated upscale
  canvas.style.width  = window.innerWidth  + 'px';
  canvas.style.height = window.innerHeight + 'px';
  rebuildCamera();
}
window.addEventListener('resize', resizeRenderer);
// (called below once camera is defined)

// ── ISOMETRIC ORTHOGRAPHIC CAMERA ─────────────────────────────────────────────
// Exact 1:√2:1 isometric angle — 45° around Y, 35.26° tilt
// This matches the original Marble Madness camera perfectly
const ISO_CAM_ANGLE = Math.atan(1 / Math.sqrt(2)); // 35.264°

let camera;
const camTarget = new THREE.Vector3();
const CAM_HEIGHT = 22;

function rebuildCamera() {
  const aspect = RW / RH; // use low-res aspect for correct iso projection
  const zoom = 7;
  camera = new THREE.OrthographicCamera(
    -zoom * aspect, zoom * aspect,
     zoom, -zoom, -200, 500
  );
  positionCamera();
}

// Camera rotation: 0=NE, 1=SE, 2=SW, 3=NW (90° steps)
let camRotation = 0;
const CAM_OFFSETS = [
  [ 1, 1, 1],  // 0: NE — default isometric
  [-1, 1, 1],  // 1: SE
  [-1, 1,-1],  // 2: SW
  [ 1, 1,-1],  // 3: NW
];
function positionCamera() {
  const [ox, oy, oz] = CAM_OFFSETS[camRotation];
  camera.position.set(
    camTarget.x + CAM_HEIGHT * ox,
    camTarget.y + CAM_HEIGHT * oy,
    camTarget.z + CAM_HEIGHT * oz
  );
  camera.lookAt(camTarget);
}
function rotateCamera() {
  camRotation = (camRotation + 1) % 4;
  positionCamera();
}
document.getElementById('rot-btn').addEventListener('click', rotateCamera);

resizeRenderer(); // now safe — rebuildCamera is defined

// ── SCENE ─────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050508);

// ── LIGHTING ──────────────────────────────────────────────────────────────────
// Hard directional light from upper-right — matches original game's look
// Toned-down ambient so tiles have strong light/dark side contrast
scene.add(new THREE.AmbientLight(0xffffff, 0.35));

const sun = new THREE.DirectionalLight(0xffffff, 1.1);
sun.position.set(10, 20, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(512, 512); // low-res shadows = pixelated
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far  = 300;
sun.shadow.camera.left = sun.shadow.camera.bottom = -50;
sun.shadow.camera.right = sun.shadow.camera.top = 50;
sun.shadow.bias = -0.002;
scene.add(sun);

// Fill from opposite side (blue tint like original)
const fill = new THREE.DirectionalLight(0x6688cc, 0.3);
fill.position.set(-8, 5, -10);
scene.add(fill);

// ── TILE GEOMETRY ─────────────────────────────────────────────────────────────
// TALL blocks — this is what the original looks like. Each tile is a thick slab.
// TILE_H: how tall each block is in world units.
// Each gz step = 1 world unit vertical. So gz=-4 means 4 units below gz=0.
const TILE_W = 1.0;
const TILE_H = 1.6;  // TALL blocks — critical for the cliff-wall aesthetic
const tileGeo = new THREE.BoxGeometry(TILE_W, TILE_H, TILE_W);

// Ramp visuals handled by stacked tile steps

// Grid line texture baked into UV — simulate the tile grid from the original
// We use a canvas texture with a grid pattern
function makeGridTexture(hexColor) {
  const size = 32;
  const cv = document.createElement('canvas');
  cv.width = cv.height = size;
  const c = cv.getContext('2d');
  const r = (hexColor >> 16) & 0xff;
  const g = (hexColor >> 8)  & 0xff;
  const b =  hexColor        & 0xff;
  c.fillStyle = `rgb(${r},${g},${b})`;
  c.fillRect(0, 0, size, size);
  // Single grid line per tile — thin border only
  c.fillStyle = 'rgba(0,0,0,0.3)';
  c.fillRect(0, 0, size, 1);      // top edge
  c.fillRect(0, 0, 1, size);      // left edge
  // Subtle highlight on inner edges
  c.fillStyle = 'rgba(255,255,255,0.1)';
  c.fillRect(1, 1, size-2, 1);
  c.fillRect(1, 1, 1, size-2);
  const tex = new THREE.CanvasTexture(cv);
  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestFilter;
  return tex;
}

// Material cache: per tile type, 6-face material array [right,left,top,bottom,front,back]
// top face gets grid texture, sides get darker solid color
const matCache = {};

const TILE_COLORS = {
  normal:  {top:0xc4c4c4, side:0x303030},
  checker: {top:0xcccccc, side:0x303030},
  red:     {top:0xcc2200, side:0x3a0800},
  yellow:  {top:0xddcc00, side:0x3a3000},
  blue:    {top:0x1188ee, side:0x081030},
  ice:     {top:0xc8eeff, side:0x0e2030},
  green:   {top:0x22aa33, side:0x0a2010},
  dark:    {top:0x4a5566, side:0x141820},
  gold:    {top:0xddaa00, side:0x302000},
  purple:  {top:0x8822cc, side:0x180828},
  lava:    {top:0xdd4400, side:0x300800},
  white:   {top:0xeeeeef, side:0x303030},
  start:   {top:0x22dd44, side:0x0a2010},
  goal:    {top:0xffcc00, side:0x303018},
  conveyor_n:{top:0xff8800,side:0x4a2000},
  conveyor_s:{top:0xff8800,side:0x4a2000},
  conveyor_e:{top:0xff8800,side:0x4a2000},
  conveyor_w:{top:0xff8800,side:0x4a2000},
  bounce:  {top:0xff44ff, side:0x4a0050},
  wave:    {top:0x00ccff, side:0x003850},
  ramp_n:  {top:0xc4c4c4, side:0x484848},
  ramp_s:  {top:0xc4c4c4, side:0x484848},
  chute_in:{top:0xffcc44, side:0x4a3400},
  chute_out:{top:0x44ffcc, side:0x003840},
};

function getTileMaterials(type, alt) {
  const key = type + (alt ? '_alt' : '');
  if (matCache[key]) return matCache[key];

  let col = TILE_COLORS[type] || TILE_COLORS.normal;
  let topHex = col.top;
  if (type === 'checker') topHex = alt ? 0xaaaaaa : 0xdddddd;

  const topTex  = makeGridTexture(topHex);
  const sideMat = new THREE.MeshLambertMaterial({ color: col.side });
  const topMat  = new THREE.MeshLambertMaterial({ map: topTex });

  // BoxGeometry face order: +x, -x, +y, -y, +z, -z
  // +y = top face (gets grid), others get side color
  const mats = [sideMat, sideMat, topMat, sideMat, sideMat, sideMat];
  matCache[key] = mats;
  return mats;
}

// Checker alternate color
function getTileMatChecker(alt) {
  return getTileMaterials('checker', alt);
}

// ── SCENE OBJECTS ─────────────────────────────────────────────────────────────
let tileObjects = [];
let enemyMeshes = [];

// Grid coords → world position
// x=gx, z=gy (Three.js z is depth), y=gz (up)
// Tile top surface sits at y = gz
// Tile mesh center is at y = gz - TILE_H/2
function g2w(gx, gy, gz) {
  return new THREE.Vector3(gx, gz, gy);
}

function buildSceneTiles(tiles) {
  tileObjects.forEach(o => {
    scene.remove(o.mesh);
    if (o.indicator) scene.remove(o.indicator);
  });
  if (tileObjects._walls) tileObjects._walls.forEach(w => scene.remove(w));
  tileObjects = [];

  // Each tile is a box. Height = TILE_H normally.
  // For exposed edges (no neighbor or lower neighbor), extend down so sides
  // fill the gap — prevents holes between step levels.
  // Build neighbor height map first.
  const colTop = new Map(); // highest gz per column
  tiles.forEach(t => {
    const k = `${Math.round(t[0])},${Math.round(t[1])}`;
    const prev = colTop.get(k);
    if (prev === undefined || t[2] > prev) colTop.set(k, t[2]);
  });

  tiles.forEach(t => {
    const [gx, gy, gz, type] = t;
    const alt = (Math.round(gx) + Math.round(gy)) % 2 === 0;
    const mats = getTileMaterials(type || 'normal', alt);

    // Height: extend down to cover gaps to lower neighbors.
    // Find the minimum neighbor gz among all 4 directions.
    const VOID = 20;
    let dropTo = gz - VOID; // default void depth
    for (const [dx,dz] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      const nh = colTop.get(`${Math.round(gx+dx)},${Math.round(gy+dz)}`);
      if (nh !== undefined) {
        // Extend to cover gap with lower neighbor (or same height = no gap)
        if (nh < gz) dropTo = Math.max(dropTo, nh - TILE_H);
      }
    }
    const tileH = Math.max(TILE_H, gz - dropTo);

    const geo = new THREE.BoxGeometry(TILE_W, tileH, TILE_W);
    const mesh = new THREE.Mesh(geo, mats);
    const wp = g2w(gx, gy, gz);
    mesh.position.set(wp.x, gz - tileH/2, wp.z);
    mesh.receiveShadow = true;
    scene.add(mesh);

    let indicator = null;
    const mechTypes = {
      conveyor_n:0xff6600,conveyor_s:0xff6600,conveyor_e:0xff6600,conveyor_w:0xff6600,
      bounce:0xff00ff,wave:0x00eeff,chute_in:0xffdd00,chute_out:0x00ffaa
    };
    if (mechTypes[type]) {
      const im = new THREE.MeshBasicMaterial({color:mechTypes[type],transparent:true,opacity:0.7,depthWrite:false});
      indicator = new THREE.Mesh(new THREE.PlaneGeometry(0.7,0.7), im);
      indicator.rotation.x = -Math.PI/2;
      indicator.position.set(wp.x, gz+0.001, wp.z);
      scene.add(indicator);
    }

    tileObjects.push({mesh,indicator,gx,gy,gz,type,tileH});
  });
  tileObjects._walls = [];
}

// Goal flag
let goalGroup = null;
function buildGoal(pos) {
  if (goalGroup) scene.remove(goalGroup);
  goalGroup = new THREE.Group();
  const wp = g2w(pos.gx, pos.gy, pos.gz);
  // Pole
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.04, 0.04, 1.4, 6),
    new THREE.MeshLambertMaterial({ color: 0x888888 })
  );
  pole.position.set(wp.x, wp.y + 0.7, wp.z);
  goalGroup.add(pole);
  // Flag — bright yellow, low-poly
  const flag = new THREE.Mesh(
    new THREE.PlaneGeometry(0.55, 0.35),
    new THREE.MeshBasicMaterial({ color: 0xffcc00, side: THREE.DoubleSide })
  );
  flag.position.set(wp.x + 0.28, wp.y + 1.2, wp.z);
  goalGroup.add(flag);
  scene.add(goalGroup);
}

// ── PLAYER MARBLE ─────────────────────────────────────────────────────────────
// Low-poly sphere — more facets visible at low res = authentic chunky look
const marbleMesh = new THREE.Mesh(
  new THREE.SphereGeometry(0.32, 8, 6), // low-poly: 8 segs horizontal, 6 vertical
  new THREE.MeshPhongMaterial({
    color: 0x4499ff,
    shininess: 80,
    specular: 0x88ccff,
    emissive: 0x001133,
  })
);
marbleMesh.castShadow = true;
scene.add(marbleMesh);

// Shadow blob
const shadowBlob = new THREE.Mesh(
  new THREE.CircleGeometry(0.28, 8),
  new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.4, depthWrite: false })
);
shadowBlob.rotation.x = -Math.PI / 2;
scene.add(shadowBlob);

// ── ENEMY MESHES ──────────────────────────────────────────────────────────────
function makeEnemyMesh(type, small) {
  const group = new THREE.Group();
  let mesh;

  if (small || type === 'rollerball' || type === 'iceball') {
    const r = small ? 0.22 : 0.28;
    const col = type === 'iceball' ? 0x88ddff : 0xff2200;
    mesh = new THREE.Mesh(
      new THREE.SphereGeometry(r, 6, 5), // very low poly
      new THREE.MeshPhongMaterial({ color: col, shininess: 60 })
    );
  } else if (type === 'pyramid') {
    mesh = new THREE.Mesh(
      new THREE.ConeGeometry(0.32, 0.7, 4), // 4-sided pyramid
      new THREE.MeshLambertMaterial({ color: 0xe0e0e0 })
    );
    mesh.rotation.y = Math.PI / 4;
  } else if (type === 'wheel') {
    const disc = new THREE.Mesh(
      new THREE.CylinderGeometry(0.35, 0.35, 0.14, 8),
      new THREE.MeshLambertMaterial({ color: 0xcc1100 })
    );
    disc.rotation.z = Math.PI / 2;
    group.add(disc);
    // 4 spokes
    for (let i = 0; i < 4; i++) {
      const s = new THREE.Mesh(
        new THREE.BoxGeometry(0.7, 0.06, 0.06),
        new THREE.MeshLambertMaterial({ color: 0xff2200 })
      );
      s.rotation.z = i * Math.PI / 4;
      group.add(s);
    }
    const hub = new THREE.Mesh(
      new THREE.SphereGeometry(0.1, 6, 4),
      new THREE.MeshLambertMaterial({ color: 0xffaa00 })
    );
    group.add(hub);
    mesh = null;
  } else if (type === 'crab') {
    mesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.28, 6, 4),
      new THREE.MeshLambertMaterial({ color: 0xdd4400 })
    );
    mesh.scale.set(1.4, 0.6, 1.0);
  } else if (type === 'skullhead') {
    mesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.3, 6, 5),
      new THREE.MeshLambertMaterial({ color: 0xeeeeee })
    );
    // Eye sockets
    const eyeGeo = new THREE.SphereGeometry(0.1, 4, 4);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff1111 });
    const el = new THREE.Mesh(eyeGeo, eyeMat);
    el.position.set(-0.1, 0.05, 0.25);
    const er = new THREE.Mesh(eyeGeo, eyeMat);
    er.position.set(0.1, 0.05, 0.25);
    group.add(el, er);
  } else if (type === 'ghost') {
    mesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.3, 6, 5),
      new THREE.MeshLambertMaterial({ color: 0xbbbbff, transparent: true, opacity: 0.7 })
    );
  } else if (type === 'bouncer') {
    mesh = new THREE.Mesh(
      new THREE.DodecahedronGeometry(0.3, 0),
      new THREE.MeshLambertMaterial({ color: 0x882200 })
    );
  } else if (type === 'slinky') {
    mesh = new THREE.Mesh(
      new THREE.TorusGeometry(0.24, 0.08, 4, 8),
      new THREE.MeshLambertMaterial({ color: 0x44aaff })
    );
  } else if (type === 'spinner') {
    mesh = new THREE.Mesh(
      new THREE.OctahedronGeometry(0.3, 0),
      new THREE.MeshLambertMaterial({ color: 0xffaa00 })
    );
  } else if (type === 'inchworm') {
    mesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.22, 5, 4),
      new THREE.MeshLambertMaterial({ color: 0x22cc22 })
    );
  } else if (type === 'bruiser') {
    mesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.48, 8, 6),
      new THREE.MeshPhongMaterial({ color:0x111111, shininess:80, specular:0x444444 })
    );
  } else {
    mesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.25, 6, 5),
      new THREE.MeshLambertMaterial({ color: 0xff4444 })
    );
  }

  if (mesh) {
    mesh.castShadow = true;
    group.add(mesh);
  }
  return group;
}

// ── PHYSICS ───────────────────────────────────────────────────────────────────
let tileMap = [], goalPos = null, chutes = [], waveTiles = [], iceLevel = false;
let player = { x:0, y:0, z:0, vx:0, vy:0, vz:0, dead:false, _inChute:false };
let enemies = [];

// ── PHYSICS: Three.js Box3 sphere-vs-box collision ───────────────────────────
// Legacy helpers kept for shadow positioning only
let tileMap_ref = []; // alias kept for shadow lookups

function rebuildTileHeightMap() { /* no-op — replaced by Box3 system */ }

// getTileBelow: used only for shadow blob Y positioning
function getTileBelow(px, pz, py) {
  let best = null;
  for (const t of tileMap) {
    if (Math.abs(t[0]-px) < 0.72 && Math.abs(t[1]-pz) < 0.72) {
      if (t[2] <= py && (best === null || t[2] > best)) best = t[2];
    }
  }
  return best;
}

// getSurfaceCrossed: still used by enemy vertical physics
function getSurfaceCrossed(px, pz, prevY, newY) {
  let best = null;
  const lo = Math.min(prevY, newY) - 0.01, hi = Math.max(prevY, newY) + 0.01;
  for (const t of tileMap) {
    if (Math.abs(t[0]-px) < 0.72 && Math.abs(t[1]-pz) < 0.72) {
      if (t[2] >= lo && t[2] <= hi && (best === null || t[2] > best)) best = t[2];
    }
  }
  return best;
}

// Each tile mesh has a Box3. We test sphere vs each box each frame.
// This is the correct 3D approach — no tunneling, no custom grid math.

const MARBLE_R = 0.32;
const GRAVITY   = 22;
let   tileBoxes = []; // [{box:Box3, type, gz}]

function rebuildTileBoxes() {
  tileBoxes = tileObjects.map(o => {
    const h  = o.tileH; // stored when tile was built
    const gz = o.gz, gx = o.gx, gy = o.gy;
    const box = new THREE.Box3(
      new THREE.Vector3(gx - 0.5, gz - h, gy - 0.5),
      new THREE.Vector3(gx + 0.5, gz,     gy + 0.5)
    );
    return { box, type: o.type, gz };
  });
}

// Resolve sphere vs all tile boxes. Moves the sphere center out of penetration.
// Returns the box we're resting on (highest surface below sphere), or null.
function resolveCollisions(pos, vel, r) {
  const sphere = new THREE.Sphere(pos.clone(), r);
  let   onGround = null;
  let   onGroundY = -Infinity;

  for (const tb of tileBoxes) {
    const box = tb.box;
    // Closest point on box to sphere center
    const cp = new THREE.Vector3().copy(sphere.center).clamp(box.min, box.max);
    const delta = new THREE.Vector3().subVectors(sphere.center, cp);
    const dist  = delta.length();

    if (dist < r && dist > 0.0001) {
      // Penetration depth and push-out normal
      const depth  = r - dist;
      const normal = delta.divideScalar(dist);

      // Push sphere out
      sphere.center.addScaledVector(normal, depth + 0.001);

      // Cancel velocity into surface
      const vDotN = vel.dot(normal);
      if (vDotN < 0) vel.addScaledVector(normal, -vDotN);

      // Is this a floor (normal pointing up)?
      if (normal.y > 0.5 && box.max.y > onGroundY) {
        onGroundY = box.max.y;
        onGround  = tb;
      }
    } else if (dist === 0) {
      // Sphere center inside box — emergency push out upward
      sphere.center.y = box.max.y + r + 0.001;
      vel.y = Math.max(vel.y, 0);
    }
  }

  pos.copy(sphere.center);
  return onGround;
}

function physStep(dt) {
  if (player.dead) return;
  const iScale = iceLevel ? 2 : 3, fric = iceLevel ? 0.975 : 0.875;
  player.vx += tbDX * dt * iScale * 14;
  player.vz += tbDY * dt * iScale * 14;
  const sp = Math.sqrt(player.vx**2 + player.vz**2), ms = iceLevel ? 12 : 10;
  if (sp > ms) { player.vx *= ms/sp; player.vz *= ms/sp; }
  player.vx *= fric; player.vz *= fric;
  player.vy -= GRAVITY * dt;

  // Start from sphere center (player.y is floor contact, +MARBLE_R = center)
  const pos = new THREE.Vector3(player.x, player.y + MARBLE_R, player.z);
  const vel = new THREE.Vector3(player.vx, player.vy, player.vz);

  // Pre-resolve any existing penetration from last frame before moving
  resolveCollisions(pos, vel, MARBLE_R);

  // Apply velocity
  pos.addScaledVector(vel, dt);

  // Resolve collisions after move — multiple passes for corners/edges
  let groundTile = null;
  for (let i = 0; i < 4; i++) {
    const g = resolveCollisions(pos, vel, MARBLE_R);
    if (g) groundTile = g;
  }

  player.x  = pos.x;
  player.y  = pos.y - MARBLE_R; // y = floor contact
  player.z  = pos.z;
  player.vx = vel.x;
  player.vy = vel.y;
  player.vz = vel.z;

  if (player.y < -40) { triggerDeath('fall'); return; }

  // Mechanic tiles
  const gnd = groundTile ? groundTile.gz : null;
  if (groundTile) {
    const tt = groundTile.type || 'normal', cf = iceLevel ? 5 : 9;
    if (tt==='conveyor_n') player.vz -= cf*dt;
    if (tt==='conveyor_s') player.vz += cf*dt;
    if (tt==='conveyor_e') player.vx += cf*dt;
    if (tt==='conveyor_w') player.vx -= cf*dt;
    if (tt==='bounce' && vel.y <= 0) { player.vy=14; player.vx*=0.3; player.vz*=0.3; }
    if (tt==='chute_in' && !player._inChute) {
      const ch = chutes.find(c=>Math.abs(c.inX-player.x)<1&&Math.abs(c.inY-player.z)<1);
      if (ch) {
        player._inChute = true;
        setTimeout(()=>{ player.x=ch.outX;player.z=ch.outY;player.y=ch.outZ||0;
          player.vx*=0.3;player.vz*=0.3;player.vy=2;player._inChute=false; },400);
      }
    }
  }
  // Wave oscillation
  waveTiles.forEach(w => {
    const t = tileMap.find(t => t[0]===w.gx && t[1]===w.gy);
    if (t) {
      const nz = w.origZ + Math.sin(Date.now()/600*w.freq + w.phase) * w.amp;
      t[2] = nz;
      const to = tileObjects.find(o => o.gx===w.gx && o.gy===w.gy);
      if (to) to.mesh.position.y = nz - TILE_H/2;
    }
  });

  // Enemy collisions
  for (const e of enemies) {
    if (e.dead) continue;
    const ep = ePos(e);
    // ep in world: ep.x, ep.y (height), ep.z
    const dx=player.x-ep.x, dz=player.z-ep.z, dy=player.y-ep.y;
    const dist = Math.sqrt(dx*dx+dz*dz+dy*dy);
    const HR = 0.32 + (e.small ? 0.22 : e.type==='bruiser' ? 0.48 : 0.3);
    if (dist < HR && dist > 0.01) {
      const nx=dx/dist, ny=dy/dist, nz=dz/dist, ov=HR-dist;
      if (e.physEnabled) {
        const pm=2,em=1;
        const rvx=player.vx-e.vx, rvy=player.vy-e.vy, rvz=player.vz-e.vz;
        const dot=rvx*nx+rvy*ny+rvz*nz;
        if(dot<0){const J=-(1+0.65)*dot/(1/pm+1/em);
          player.vx+=J/pm*nx;player.vy+=J/pm*ny;player.vz+=J/pm*nz;
          e.vx-=J/em*nx;e.vy-=J/em*ny;e.vz-=J/em*nz;}
        player.x+=nx*ov*(em/(pm+em));player.z+=nz*ov*(em/(pm+em));
        e.physX-=nx*ov*(pm/(pm+em));e.physZ-=nz*ov*(pm/(pm+em));
      } else {
        const evx=e.cvx||0,evz=e.cvy||0,chg=Math.sqrt(evx*evx+evz*evz);
        const bump=(e.type==='bruiser'?12:5.5)+chg*1.8;
        player.vx+=nx*bump;player.vz+=nz*bump;player.vy+=(e.type==='bruiser'?3:1.2);
        player.x+=nx*ov;player.z+=nz*ov;
      }
    }
  }

  // Phys enemies
  for (const e of enemies) {
    if (!e.physEnabled||e.dead) continue;
    e.vy -= 22*dt; e.vx*=0.87; e.vz*=0.87;
    const ePos3 = new THREE.Vector3(e.physX, e.physY + 0.22, e.physZ);
    const eVel  = new THREE.Vector3(e.vx, e.vy, e.vz);
    ePos3.addScaledVector(eVel, dt);
    for (let i=0;i<2;i++) resolveCollisions(ePos3, eVel, 0.22);
    e.physX=ePos3.x; e.physY=ePos3.y-0.22; e.physZ=ePos3.z;
    e.vx=eVel.x; e.vy=eVel.y; e.vz=eVel.z;
    const ePrevY = e.physY;
    e.physY += e.vy * dt;
    const eg = getSurfaceCrossed(e.physX, e.physZ, ePrevY, e.physY);
    if (eg !== null && e.physY <= eg + 0.01 && e.vy <= 0) { e.physY = eg; e.vy = 0; }
    if(e.physY < -40) e.dead = true;
    e.gx=e.physX;e.gy=e.physZ;e.gz=e.physY;
  }

  // Goal
  if (goalPos) {
    const gw = g2w(goalPos.gx, goalPos.gy, goalPos.gz);
    const d = Math.sqrt((player.x-gw.x)**2+(player.z-gw.z)**2+(player.y-gw.y)**2);
    if (d < 1.2) levelComplete();
  }

  // Camera lerp
  const target = new THREE.Vector3(player.x, player.y, player.z);
  camTarget.lerp(target, 0.1);
  positionCamera();
  // Move sun with camera for consistent lighting
  sun.position.set(camTarget.x+10, camTarget.y+20, camTarget.z+5);
  sun.target.position.copy(camTarget);
  sun.target.updateMatrixWorld();
}

function ePos(e) {
  if (e.physEnabled) return {x:e.physX, y:e.physY, z:e.physZ};
  return {x:e.gx, y:e.gz, z:e.gy}; // note: e.gz = world Y (height), e.gy = world Z
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
let tbDX=0, tbDY=0, tbActive=false, tbPrevX=0, tbPrevY=0;
function applyDrag(sdx,sdy) {
  const S=5.3, rx=sdx/S, ry=sdy/S;
  // Base iso mapping: screen right = world +x AND -z
  let wx=rx+ry, wy=ry-rx;
  // Rotate input axes to match camera rotation
  const rot = camRotation;
  if (rot===1){const t=wx;wx=-wy;wy=t;}
  else if(rot===2){wx=-wx;wy=-wy;}
  else if(rot===3){const t=wx;wx=wy;wy=-t;}
  const m=Math.sqrt(wx*wx+wy*wy);if(m>1){wx/=m;wy/=m;}
  tbDX=wx; tbDY=wy;
}
const cv=canvas;
cv.addEventListener('mousedown',e=>{tbActive=true;tbPrevX=e.clientX;tbPrevY=e.clientY;tbDX=0;tbDY=0;e.preventDefault();},{passive:false});
window.addEventListener('mousemove',e=>{
  if(!tbActive)return;
  applyDrag(e.clientX-tbPrevX, e.clientY-tbPrevY);
  // Delta mode: update prev each frame so drag measures movement, not offset from click
  tbPrevX=e.clientX; tbPrevY=e.clientY;
});
window.addEventListener('mouseup',()=>{tbActive=false;tbDX=0;tbDY=0;});
window.addEventListener('mouseleave',()=>{tbActive=false;tbDX=0;tbDY=0;});
window.addEventListener('blur',()=>{tbActive=false;tbDX=0;tbDY=0;});
cv.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];tbActive=true;tbPrevX=t.clientX;tbPrevY=t.clientY;tbDX=0;tbDY=0;},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();if(!tbActive||!e.touches.length)return;const t=e.touches[0];applyDrag(t.clientX-tbPrevX,t.clientY-tbPrevY);tbPrevX=t.clientX;tbPrevY=t.clientY;},{passive:false});
cv.addEventListener('touchend',()=>{tbActive=false;tbDX=0;tbDY=0;});
const keys={};
window.addEventListener('keydown',e=>{keys[e.key]=true;});

setInterval(()=>{
  if(tbActive)return;
  let wx=0,wy=0;
  if(keys['ArrowUp']||keys['w']){wx-=1;wy-=1;}
  if(keys['ArrowDown']||keys['s']){wx+=1;wy+=1;}
  if(keys['ArrowLeft']||keys['a']){wx-=1;wy+=1;}
  if(keys['ArrowRight']||keys['d']){wx+=1;wy-=1;}
  const m=Math.sqrt(wx*wx+wy*wy)||1;
  let kx=(wx/m)*.75, ky=(wy/m)*.75;
  const rot=camRotation;
  if(rot===1){const t=kx;kx=-ky;ky=t;}
  else if(rot===2){kx=-kx;ky=-ky;}
  else if(rot===3){const t=kx;kx=ky;ky=-t;}
  tbDX=kx;tbDY=ky;
},16);

// ── ENEMY CLASS ───────────────────────────────────────────────────────────────
class Enemy {
  constructor(def) {
    Object.assign(this,def);
    this.t=Math.random()*.5;this.dir=1;this.anim=0;this.dead=false;this.cvx=0;this.cvy=0;
    if(this.small||this.type==='inchworm'){
      this.vx=0;this.vy=0;this.vz=0;
      this.physX=this.gx;this.physZ=this.gy;this.physY=this.gz;
      this.physEnabled=true;this.sleeping=true;this.wakeRadius=4;
    }
    this.chases=['rollerball','iceball','skullhead','ghost','crab','bruiser'].includes(this.type);
    this.patrolA=(def.path&&def.path[0])||{gx:def.gx,gy:def.gy,gz:def.gz};
    this.patrolB=(def.path&&def.path[1])||{gx:def.gx,gy:def.gy,gz:def.gz};
  }
  update(dt) {
    this.anim+=dt;
    if(this.physEnabled){
      if(this.sleeping&&!player.dead){
        const dx=player.x-this.physX,dz=player.z-this.physZ;
        if(Math.sqrt(dx*dx+dz*dz)<this.wakeRadius)this.sleeping=false;
      }
      if(!this.sleeping&&!player.dead){
        const dx=player.x-this.physX,dz=player.z-this.physZ,d=Math.sqrt(dx*dx+dz*dz)||1;
        this.vx+=dx/d*8*dt;this.vz+=dz/d*8*dt;
        const s=Math.sqrt(this.vx*this.vx+this.vz*this.vz);if(s>4){this.vx*=4/s;this.vz*=4/s;}
      }
      return;
    }
    const sp=this._spd();
    if(this.chases&&!player.dead){
      const dx=player.x-this.gx,dz=player.z-(this.gy),d=Math.sqrt(dx*dx+dz*dz)||1;
      this.cvx+=(dx/d)*sp*dt*4;this.cvy+=(dz/d)*sp*dt*4;
      const cs=Math.sqrt(this.cvx**2+this.cvy**2);if(cs>sp){this.cvx*=sp/cs;this.cvy*=sp/cs;}
      this.cvx*=.92;this.cvy*=.92;
      this.gx+=this.cvx*dt;this.gy+=this.cvy*dt;
      this.gz+=(((this.patrolA.gz+this.patrolB.gz)/2)-this.gz)*.08;
      const mnX=Math.min(this.patrolA.gx,this.patrolB.gx)-1,mxX=Math.max(this.patrolA.gx,this.patrolB.gx)+1;
      const mnY=Math.min(this.patrolA.gy,this.patrolB.gy)-1,mxY=Math.max(this.patrolA.gy,this.patrolB.gy)+1;
      if(this.gx<mnX){this.gx=mnX;this.cvx=Math.abs(this.cvx);}
      if(this.gx>mxX){this.gx=mxX;this.cvx=-Math.abs(this.cvx);}
      if(this.gy<mnY){this.gy=mnY;this.cvy=Math.abs(this.cvy);}
      if(this.gy>mxY){this.gy=mxY;this.cvy=-Math.abs(this.cvy);}
    } else {
      if(!this.path||this.path.length<2)return;
      this.t+=dt*sp*this.dir;
      if(this.t>=1){this.t=1;this.dir=-1;}if(this.t<=0){this.t=0;this.dir=1;}
      const a=this.path[0],b=this.path[1];
      this.gx=a.gx+(b.gx-a.gx)*this.t;this.gy=a.gy+(b.gy-a.gy)*this.t;this.gz=a.gz+(b.gz-a.gz)*this.t;
    }
  }
  _spd(){return{rollerball:1.4,iceball:1.8,inchworm:.3,slinky:.6,bouncer:.8,spinner:.5,ghost:1.0,pyramid:.8,wheel:1.1,crab:1.5,skullhead:1.8,bruiser:2.5}[this.type]||.6;}
}

function R(x,y,z,len,t){const a=[];for(let i=0;i<len;i++)a.push([x+i,y,z,t]);return a;}
function C(x,y,z,len,t){const a=[];for(let i=0;i<len;i++)a.push([x,y+i,z,t]);return a;}
function B(x,y,z,w,h,t){const a=[];for(let dx=0;dx<w;dx++)for(let dy=0;dy<h;dy++)a.push([x+dx,y+dy,z,t]);return a;}
function RampY(x,y,z,len,w,t){const a=[];for(let i=0;i<len;i++)for(let j=0;j<w;j++)a.push([x+j,y+i,z-i,t]);return a;}
function HalfPipe(x,y,z,len,w,depth,t){
  const a=[];
  for(let i=0;i<len;i++)for(let j=0;j<w;j++){
    const u=(j/(w-1))*2-1;
    const dz=Math.round(depth*(1-u*u)*4)/4;
    a.push([x+j,y+i,z-dz,t]);
  }
  return a;
}
function ValleyDown(x,y,z,len,w,depth,t){
  const a=[];
  for(let i=0;i<len;i++){
    const dz=i<len/2?Math.round(depth*(i/(len/2))*4)/4:depth;
    for(let j=0;j<w;j++)a.push([x+j,y+i,z-dz,t]);
  }
  return a;
}
function CurveDown(x,y,z,len,w,drop,t){
  const a=[];
  for(let i=0;i<len;i++){
    const ease=drop*(0.5-0.5*Math.cos(Math.PI*i/len));
    const gz=z-Math.round(ease*4)/4;
    for(let j=0;j<w;j++)a.push([x+j,y+i,gz,t]);
  }
  return a;
}
function DiagBridge(x,y,z,len,t){const a=[];for(let i=0;i<len;i++)a.push([x+i,y+i,z,t]);return a;}

function buildLevel(n){
  const fns=[L1,L2,L3,L4,L5,L6,L7,L8,L9,L10];
  const d=(fns[n]||L1)();
  d.tiles=d.tiles.filter(t=>Array.isArray(t)&&t.length>=3&&typeof t[0]==='number');
  return d;
}

// ── GAME STATE ────────────────────────────────────────────────────────────────
let state='start',currentLevel=0,lives=3,score=0,levelTime=60,timerInt=null;
function show(id){document.getElementById(id).style.display='flex';}
function hide(id){document.getElementById(id).style.display='none';}
function updateHUD(){
  document.getElementById('sc').textContent=score;
  document.getElementById('lv').textContent=currentLevel+1;
  document.getElementById('tm').textContent=Math.max(0,levelTime);
  for(let i=0;i<3;i++)document.getElementById('l'+i).className='ld'+(i>=lives?' dead':'');
  const m=LEVEL_TIMES[currentLevel]||60;
  document.getElementById('tb').style.width=Math.max(0,levelTime/m*100)+'%';
}

function loadLevel(n) {
  clearInterval(timerInt);
  const def = buildLevel(n);
  tileMap = def.tiles;
  rebuildTileHeightMap();
  goalPos = def.goal;
  iceLevel = !!def.icePhysics;
  chutes = def.chutes || [];
  waveTiles = tileMap.filter(t=>t[3]==='wave').map((t,i)=>({gx:t[0],gy:t[1],origZ:t[2],freq:1.5+i*.3,amp:.5,phase:i*.9}));

  // Reset player
  player.x = def.start.gx; player.z = def.start.gy; player.y = def.start.gz; // floor contact point; mesh renders at +radius
  player.vx=0; player.vy=0; player.vz=0; player.dead=false; player._inChute=false;

  // Camera to start
  camTarget.set(player.x, player.y, player.z);
  positionCamera();

  // Build scene
  buildSceneTiles(def.tiles);
  rebuildTileBoxes();
  buildGoal(def.goal);

  // Enemies
  enemyMeshes.forEach(em => { scene.remove(em.group); scene.remove(em.shadow); });
  enemyMeshes = [];
  enemies = (def.enemies||[]).map(e => {
    const en = new Enemy(e);
    const grp = makeEnemyMesh(e.type, e.small);
    const shad = new THREE.Mesh(
      new THREE.CircleGeometry(0.24, 6),
      new THREE.MeshBasicMaterial({color:0,transparent:true,opacity:.35,depthWrite:false})
    );
    shad.rotation.x = -Math.PI/2;
    scene.add(grp); scene.add(shad);
    enemyMeshes.push({group:grp,shadow:shad,enemy:en});
    return en;
  });

  levelTime = LEVEL_TIMES[n]||60;
  updateHUD();
  timerInt = setInterval(()=>{
    if(state!=='playing')return;
    levelTime--; updateHUD();
    if(levelTime<=0) triggerDeath('time');
  },1000);
}

function showLevelIntro(){
  state='intro';
  document.getElementById('lv-num').textContent=currentLevel+1;
  document.getElementById('lv-name').textContent=LEVEL_NAMES[currentLevel]||'LEVEL '+(currentLevel+1);
  show('ov-level');
}
function startLevel(){hide('ov-level');loadLevel(currentLevel);state='playing';}
function levelComplete(){
  if(state!=='playing')return;
  state='done';clearInterval(timerInt);score+=levelTime*120+700;updateHUD();
  currentLevel++;
  if(currentLevel>=10){document.getElementById('win-sc').textContent=score;show('ov-win');state='win';}
  else setTimeout(showLevelIntro,500);
}
function triggerDeath(reason){
  if(player.dead)return;
  player.dead=true;state='dying';clearInterval(timerInt);lives--;updateHUD();
  setTimeout(()=>{
    if(lives<=0){document.getElementById('final-sc').textContent=score;show('ov-over');state='gameover';}
    else if(reason==='time'){document.getElementById('time-sub').textContent='LIVES: '+lives;show('ov-time');}
    else{document.getElementById('dead-sub').textContent='LIVES: '+lives;show('ov-dead');}
  },700);
}
function fullReset(){currentLevel=0;lives=3;score=0;updateHUD();}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (state === 'playing') {
    physStep(dt);

    // Update enemy meshes
    enemyMeshes.forEach(({group, shadow, enemy}) => {
      enemy.update(dt);
      if (enemy.dead) { group.visible = shadow.visible = false; return; }
      const ep = ePos(enemy);
      group.position.set(ep.x, ep.y + 0.3, ep.z);
      group.visible = ep.y > -25;

      // Rotate enemies
      if (enemy.type==='wheel'||enemy.type==='spinner') group.rotation.z += dt*3;
      if (enemy.type==='pyramid') group.rotation.y += dt*.8;
      if (enemy.type==='bouncer') group.rotation.y += dt*2;
      if (enemy.type==='ghost') group.position.y += Math.sin(enemy.anim*2)*.08;

      // Shadow
      const sg = getTileBelow(ep.x, ep.z, ep.y - 0.1);
      if (sg !== null) {
        shadow.position.set(ep.x, sg + 0.02, ep.z);
        const dist = ep.y - sg;
        shadow.material.opacity = Math.max(0, 0.35 - dist*.07);
        shadow.visible = dist < 5 && !enemy.dead;
      } else shadow.visible = false;
    });

    // Player marble
    marbleMesh.position.set(player.x, player.y + 0.32, player.z); // +radius so ball sits ON surface
    marbleMesh.visible = player.y > -15;
    // Roll based on velocity
    marbleMesh.rotation.x += player.vz * dt * 2;
    marbleMesh.rotation.z -= player.vx * dt * 2;

    // Player shadow
    const sg = getTileBelow(player.x, player.z, player.y - 0.1);
    if (sg !== null) {
      shadowBlob.position.set(player.x, sg + 0.02, player.z);
      const dist = player.y - sg;
      shadowBlob.material.opacity = Math.max(0, 0.4 - dist*.05);
      shadowBlob.visible = dist < 8 && !player.dead;
    } else shadowBlob.visible = false;

    // Animate goal flag
    if (goalGroup) goalGroup.children[1] && (goalGroup.children[1].rotation.y = Math.sin(Date.now()*.003)*.4);

    // Animate conveyor indicators
    tileObjects.forEach(to => {
      if (to.indicator && to.type.startsWith('conveyor')) {
        to.indicator.material.opacity = 0.5 + 0.2 * Math.sin(Date.now()*.004);
      }
    });
  }

  renderer.render(scene, camera);
}

// Buttons
document.getElementById('btn-start').onclick=()=>{hide('ov-start');fullReset();showLevelIntro();};
document.getElementById('btn-go').onclick=startLevel;

document.getElementById('btn-time').onclick=()=>{hide('ov-time');startLevel();};
document.getElementById('btn-over').onclick=()=>{hide('ov-over');fullReset();showLevelIntro();};
document.getElementById('btn-win').onclick=()=>{hide('ov-win');fullReset();showLevelIntro();};

animate();
</script>
